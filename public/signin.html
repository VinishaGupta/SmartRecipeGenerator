<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Log In</title>

  <link rel="stylesheet" href="signin.css" />
</head>

<body>

  <div class="signin-container">

    <!-- LEFT -->

    <div class="signin-visual">

      <div class="overlay"></div>

      <div class="visual-content">

        <h1>
          Precision cooking meets artisanal flair.
        </h1>

        <p>
          Experience the future of the home kitchen
          with AI-powered recipes tailored to your palate.
        </p>

      </div>

    </div>

    <!-- RIGHT -->

    <div class="signin-form-section">

      <h2 id="authTitle">
        Welcome Back
      </h2>

      <p id="authSubtitle">
        Your personal sous-chef is ready to assist.
      </p>

      <!-- SOCIAL -->

      <div class="signin-buttons-group">

        <button class="signin-btn google">
          Google
        </button>

        <span class="signin-divider">|</span>

        <button class="signin-btn">
          Apple
        </button>

      </div>

      <div class="or-email">
        OR EMAIL
      </div>

      <!-- TOGGLE -->

      <div
        class="auth-toggle"
        id="authToggle"
        data-mode="login"
      >

        <span class="toggle-pill"></span>

        <button
          id="toggleLogin"
          class="active"
          type="button"
        >
          Sign In
        </button>

        <button
          id="toggleSignup"
          type="button"
        >
          Sign Up
        </button>

      </div>

      <!-- LOGIN -->

      <form

        id="loginForm"
        class="auth-panel active"
      >
        <div id="loginError" class="auth-error" style="color:red;min-height:1.5em;"></div>
        <div class="signin-form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" name="loginEmail" required />
        </div>
        <div class="signin-form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" name="loginPassword" required />
        </div>
        <div class="signin-checkbox-group">
          <label>
            <input type="checkbox" name="rememberMe" />
            Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>
        <button class="signin-submit" type="submit">Sign In</button>
      </form>

      <!-- SIGNUP -->

      <form

        id="signupForm"
        class="auth-panel"
      >
        <div id="signupError" class="auth-error" style="color:red;min-height:1.5em;"></div>
        <div class="signin-form-group">
          <label for="signupName">Full Name</label>
          <input type="text" id="signupName" name="signupName" required />
        </div>
        <div class="signin-form-group">
          <label for="signupEmail">Email Address</label>
          <input type="email" id="signupEmail" name="signupEmail" required />
        </div>
        <div class="signin-form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" name="signupPassword" required />
        </div>
        <div class="signin-form-group">
          <label for="signupConfirmPassword">Confirm Password</label>
          <input type="password" id="signupConfirmPassword" name="signupConfirmPassword" required />
        </div>
        <button class="signin-submit" type="submit">Create Account</button>
      </form>

    </div>

  </div>

  <script>

    const authToggle =
      document.getElementById("authToggle");

    const toggleLogin =
      document.getElementById("toggleLogin");

    const toggleSignup =
      document.getElementById("toggleSignup");

    const loginForm =
      document.getElementById("loginForm");

    const signupForm =
      document.getElementById("signupForm");

    const authTitle =
      document.getElementById("authTitle");

    const authSubtitle =
      document.getElementById("authSubtitle");

    function showLogin(){

      authToggle.setAttribute(
        "data-mode",
        "login"
      );

      toggleLogin.classList.add("active");

      toggleSignup.classList.remove("active");

      loginForm.classList.add("active");

      signupForm.classList.remove("active");

      authTitle.textContent =
        "Welcome Back";

      authSubtitle.textContent =
        "Your personal sous-chef is ready to assist.";
    }

    function showSignup(){

      authToggle.setAttribute(
        "data-mode",
        "signup"
      );

      toggleSignup.classList.add("active");

      toggleLogin.classList.remove("active");

      signupForm.classList.add("active");

      loginForm.classList.remove("active");

      authTitle.textContent =
        "Join the Kitchen";

      authSubtitle.textContent =
        "Create your account to save and personalize recipes.";
    }

    toggleLogin.addEventListener(
      "click",
      showLogin
    );

    toggleSignup.addEventListener(
      "click",
      showSignup
    );
</script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="app.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>

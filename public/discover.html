<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Discover Recipes - Culinary Intelligence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/lucide@latest"></script>

</head>
<body>

<header class="site-header">
  <a class="brand" href="index.html">Culinary Intelligence</a>
  <nav class="top-nav" aria-label="Primary navigation">
    <a href="index.html">Home</a>
    <a class="active" href="discover.html">Discover</a>
  </nav>
  <div class="header-actions">
    <a id="authBtn" class="icon-btn" href="signin.html" title="Sign in">Sign in</a>
  </div>

<main class="page">
  <section class="discover-page-full">
    <section class="recipes-section">

          <h1>Discover Recipes</h1>
          <p id="resultSummary" class="helper">Loading recipes...</p>

  </section>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>

</script>

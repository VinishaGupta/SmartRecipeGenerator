<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Recipe Details | Culinary Intelligence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<header class="site-header recipe-site-header">
  <a class="brand" href="index.html">Culinary Intelligence</a>
  <div class="header-actions">
    <button class="save-action" type="button">
      <i data-lucide="heart"></i>
      Save
    </button>
    <button class="icon-btn" type="button" title="Share">
      <i data-lucide="share-2"></i>
    </button>
    <button class="icon-btn" type="button" title="Print">
      <i data-lucide="printer"></i>
    </button>
  </div>
</header>

<main class="recipe-detail-page">
  <a class="back-link" href="index.html">
    <i data-lucide="arrow-left"></i>
    Back to recipes
  </a>

  <section id="recipeDetail" class="recipe-detail">
    <p class="helper">Loading recipe...</p>
  </section>
</main>

<script src="recipe.js"></script>
<script>
  lucide.createIcons();
</script>

</body>
</html>
